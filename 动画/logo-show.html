<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵机剪影 - 品牌动画</title>
    <!-- 引入并保留你 LOGO 的原生 CSS 变量 -->
    <style>
        :root {
            --color-system-blue: #0A84FF;
            --color-panel-elevated: #2C2C2E;
            --color-separator: #38383A;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        .container {
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            position: relative;
            background: #1C1C1E;
            box-shadow: 0 0 80px rgba(10, 132, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ================= 核心动画 CSS ================= */
        
        /* 1. 粒子悬浮动画 */
        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(0); }
            50% { opacity: var(--max-opacity); }
            100% { opacity: 0; transform: translateY(-40px); }
        }

        /* 2. 科技圆环进场 */
        .rings-group {
            opacity: 0;
            transform: scale(0.2);
            animation: ringIntro 3s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }
        @keyframes ringIntro {
            to { opacity: 0.8; transform: scale(1); }
        }

        /* 3. LOGO核心 4倍缩放移焦入场 */
        .logo-group {
            opacity: 0;
            transform: scale(4);
            filter: drop-shadow(0 15px 40px rgba(10, 132, 255, 0.5)) blur(20px);
            animation: logoIntro 2.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes logoIntro {
            to { 
                opacity: 1; 
                transform: scale(1.6); 
                filter: drop-shadow(0 15px 40px rgba(10, 132, 255, 0.5)) blur(0px); 
            }
        }

        /* 4. 液体流光描边跑马灯动画 */
        .trace-line {
            opacity: 0;
            stroke-dasharray: 400;
            stroke-dashoffset: 400;
            fill: transparent;
            stroke: url(#blueGradient);
        }
        .trace-0 { animation: traceIntro 2.5s ease-in-out 0.5s forwards; filter: blur(0px); stroke-width: 2px;}
        .trace-1 { animation: traceIntro 2.5s ease-in-out 0.7s forwards; filter: blur(2px); stroke-width: 4px;}
        .trace-2 { animation: traceIntro 2.5s ease-in-out 0.9s forwards; filter: blur(4px); stroke-width: 6px;}
        
        @keyframes traceIntro {
            0% { opacity: 0; stroke-dashoffset: 400; }
            50% { opacity: 0.8; }
            100% { opacity: 0; stroke-dashoffset: 0; }
        }

        /* 5. 高科技扫描线动画 */
        .scanline {
            opacity: 0;
            transform: translateY(-20px);
            animation: scanlineSweep 1.2s linear 2.4s forwards;
            mix-blend-mode: overlay;
            pointer-events: none;
        }
        @keyframes scanlineSweep {
            0% { opacity: 0; transform: translateY(-20px); }
            50% { opacity: 1; transform: translateY(45px); }
            100% { opacity: 0; transform: translateY(110px); }
        }

        /* 6. 文字与底线进场 */
        .text-group {
            opacity: 0;
            transform: translateY(180px);
            filter: blur(10px);
            animation: textIntro 1.2s cubic-bezier(0.16, 1, 0.3, 1) 2.2s forwards;
        }
        @keyframes textIntro {
            to { opacity: 1; transform: translateY(220px); filter: blur(0px); }
        }

        .base-line {
            opacity: 0;
            stroke-dasharray: 360;
            stroke-dashoffset: 360;
            animation: lineExpand 1s ease-in-out 2.88s forwards;
        }
        @keyframes lineExpand {
            to { opacity: 0.6; stroke-dashoffset: 0; }
        }

        .subtitle {
            opacity: 0;
            animation: fadeIn 1s ease-in-out 3.52s forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 基础画布 16:9 标准比例 1280x720 -->
        <svg viewBox="0 0 1280 720">
            
            <!-- ================= 滤镜与遮罩定义 ================= -->
            <defs>
                <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#47A1FF" />
                    <stop offset="50%" stop-color="#0A84FF" />
                    <stop offset="100%" stop-color="#5E5CE6" />
                </linearGradient>

                <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
                    <stop offset="60%" stop-color="#1C1C1E" stop-opacity="0" />
                    <stop offset="100%" stop-color="#000000" stop-opacity="0.8" />
                </radialGradient>

                <linearGradient id="scanlineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0" />
                    <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.9" />
                    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
                </linearGradient>

                <!-- 你的原始遮罩代码 -->
                <mask id="kite-cutout-app-icon">
                    <rect width="120" height="120" fill="white" />
                    <polygon points="56,45 56,65 68,55" fill="black" stroke="black" stroke-width="4" stroke-linejoin="round" />
                    <path d="M 45 40 Q 30 45 25 50 Q 35 52 45 48 Z" fill="black" stroke="black" stroke-width="3" stroke-linejoin="round" />
                    <path d="M 75 40 Q 90 45 95 50 Q 85 52 75 48 Z" fill="black" stroke="black" stroke-width="3" stroke-linejoin="round" />
                </mask>
            </defs>

            <!-- ================= 1. 背景层 ================= -->
            <!-- 动态网格层 -->
            <g id="background-grid"></g>
            
            <!-- 动态粒子层 -->
            <g id="particles"></g>

            <!-- ================= 2. 核心视觉区 ================= -->
            <g transform="translate(640, 320)">
                
                <!-- A. 全息科技能量环 -->
                <g class="rings-group">
                    <circle class="ring-el" data-speed="1.2" r="180" fill="none" stroke="url(#blueGradient)" stroke-width="1.5" stroke-dasharray="15, 30" opacity="0.3"></circle>
                    <circle class="ring-el" data-speed="-0.6" r="220" fill="none" stroke="url(#blueGradient)" stroke-width="2" stroke-dasharray="4, 12, 40, 12" opacity="0.3"></circle>
                    <circle class="ring-el" data-speed="0.3" r="260" fill="none" stroke="url(#blueGradient)" stroke-width="1" stroke-dasharray="100, 150" opacity="0.3"></circle>
                </g>

                <!-- B. 核心 LOGO + 电影级特效层 -->
                <g class="logo-group">
                    <g transform="translate(-60, -60)">
                        
                        <!-- 特效层 1：流光描边 -->
                        <rect class="trace-line trace-0" x="5" y="5" width="110" height="110" rx="26" />
                        <rect class="trace-line trace-1" x="5" y="5" width="110" height="110" rx="26" />
                        <rect class="trace-line trace-2" x="5" y="5" width="110" height="110" rx="26" />

                        <!-- --- 完全未修改的原始 LOGO 代码 --- -->
                        <rect x="5" y="5" width="110" height="110" rx="26" fill="var(--color-panel-elevated)" stroke="var(--color-separator)" stroke-width="2"/>
                        <g transform="translate(60,60) scale(0.75) translate(-60,-60)">
                            <path 
                              d="M 60 15 C 85 40 105 45 110 50 C 95 60 85 85 80 105 C 70 85 65 75 60 70 C 55 75 50 85 40 105 C 35 85 25 60 10 50 C 15 45 35 40 60 15 Z" 
                              fill="var(--color-system-blue)" 
                              stroke="var(--color-system-blue)" 
                              stroke-width="6" 
                              stroke-linejoin="round" 
                              stroke-linecap="round" 
                              mask="url(#kite-cutout-app-icon)" 
                            />
                        </g>
                        <!-- --- 原始 LOGO 代码结束 --- -->

                        <!-- 特效层 2：高科技扫描线 -->
                        <rect class="scanline" x="5" y="5" width="110" height="15" fill="url(#scanlineGradient)" />

                    </g>
                </g>

                <!-- C. 品牌文字与能量线条 -->
                <g class="text-group">
                    <!-- 托底线 -->
                    <line class="base-line" x1="-180" y1="-50" x2="180" y2="-50" stroke="url(#blueGradient)" stroke-width="2" />

                    <!-- 主标题 -->
                    <text text-anchor="middle" font-size="48" font-weight="900" letter-spacing="0.25em" fill="#FFFFFF" style="text-shadow: 0 0 20px rgba(10, 132, 255, 0.6);">
                        灵机剪影
                    </text>
                    
                    <!-- 副标题 -->
                    <text class="subtitle" y="40" text-anchor="middle" font-size="16" font-weight="300" letter-spacing="0.4em" fill="#8E8E93">
                        智能激发 · 创意无界
                    </text>
                </g>

            </g>

            <!-- ================= 3. 全局暗角遮罩 ================= -->
            <rect width="1280" height="720" fill="url(#vignette)" style="pointer-events: none;" />

        </svg>
    </div>

    <!-- ================= 原生 JS 动力系统 ================= -->
    <script>
        const WIDTH = 1280;
        const HEIGHT = 720;
        const CX = WIDTH / 2;
        const CY = HEIGHT / 2;

        // 1. 初始化生成网格背景
        const gridGroup = document.getElementById('background-grid');
        const gridColor = "rgba(255, 255, 255, 0.04)";
        let gridHTML = '';
        for (let i = -WIDTH; i < WIDTH * 2; i += 80) {
            gridHTML += `<line x1="${i}" y1="${-HEIGHT}" x2="${i}" y2="${HEIGHT * 2}" stroke="${gridColor}" stroke-width="1" />`;
        }
        for (let i = -HEIGHT; i < HEIGHT * 2; i += 80) {
            gridHTML += `<line x1="${-WIDTH}" y1="${i}" x2="${WIDTH * 2}" y2="${i}" stroke="${gridColor}" stroke-width="1" />`;
        }
        gridGroup.innerHTML = gridHTML;

        // 2. 初始化生成粒子系统
        const particlesGroup = document.getElementById('particles');
        let particlesHTML = '';
        for(let i = 0; i < 60; i++) {
            const cx = Math.random() * WIDTH;
            const cy = Math.random() * HEIGHT;
            const r = Math.random() * 2 + 0.5;
            const maxOpacity = Math.random() * 0.6 + 0.1;
            const delay = Math.random() * 3;
            const duration = 2.5 + Math.random() * 4;
            
            particlesHTML += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#0A84FF" style="filter: blur(1px); --max-opacity: ${maxOpacity}; animation: particleFloat ${duration}s ease-in-out ${delay}s infinite;" />`;
        }
        particlesGroup.innerHTML = particlesHTML;

        // 3. 核心物理帧循环 (处理网格呼吸与圆环自转)
        const rings = document.querySelectorAll('.ring-el');
        
        function loop(time) {
            const t = time * 0.0005;
            
            // 网格缓慢呼吸浮动 (模拟摄像机微动)
            const rotate = Math.sin(t * 0.1) * 1;
            const scale = 1 + Math.sin(t * 0.2) * 0.03;
            gridGroup.setAttribute('transform', `translate(${CX}, ${CY}) rotate(${rotate}) scale(${scale}) translate(${-CX}, ${-CY})`);

            // 科技能量环持续自转
            rings.forEach(ring => {
                const speed = parseFloat(ring.getAttribute('data-speed'));
                const currentRotate = (time * 0.02 * speed) % 360;
                ring.setAttribute('transform', `rotate(${currentRotate})`);
            });

            requestAnimationFrame(loop);
        }
        
        // 启动动画引擎
        requestAnimationFrame(loop);
    </script>
</body>
</html>
